<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
    <title>Nexus-Code Chat</title>
    <style>
        :root {
            --padding: 16px;
            --border-color: var(--vscode-widget-border, rgba(128, 128, 128, 0.2));
            --bubble-user: var(--vscode-editor-background);
            --bubble-assistant: var(--vscode-editorWidget-background);
            --primary: var(--vscode-button-background);
            --primary-hover: var(--vscode-button-hoverBackground);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 13px;
            color: var(--vscode-editor-foreground);
            background-color: var(--vscode-editor-background);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--vscode-editor-background);
            position: relative;
        }

        .model-selector {
            background-color: var(--vscode-dropdown-background);
            color: var(--vscode-dropdown-foreground);
            border: 1px solid var(--vscode-dropdown-border);
            padding: 4px 24px 4px 12px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            appearance: none;
        }

        .settings-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--vscode-icon-foreground);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            opacity: 0.7;
        }
        .settings-btn:hover { opacity: 1; }

        /* SETTINGS PANEL */
        .settings-panel {
            display: none;
            position: absolute;
            top: 45px; left: 0; right: 0; bottom: 0;
            background-color: var(--vscode-editor-background);
            z-index: 100;
            padding: var(--padding);
            overflow-y: auto;
        }
        .settings-panel.open { display: block; }
        
        .btn {
            background-color: var(--primary);
            color: var(--vscode-button-foreground);
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 500;
        }
        .btn:hover { background-color: var(--primary-hover); }

        /* MESSAGES */
        .messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: var(--padding);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 95%;
        }

        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }

        .message-role {
            font-weight: 600;
            font-size: 0.85em;
            color: var(--vscode-descriptionForeground);
            margin-bottom: 2px;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background-color: var(--vscode-textBlockQuote-background, rgba(128,128,128,0.1));
            border: 1px solid var(--border-color);
            border-bottom-right-radius: 2px;
        }

        .message.assistant .message-content {
            background-color: transparent;
        }

        .message-content p { margin: 0 0 10px 0; }
        .message-content p:last-child { margin: 0; }

        /* CODE BLOCKS */
        .code-block-wrapper {
            margin: 10px 0;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: var(--vscode-textCodeBlock-background, rgba(0,0,0,0.2));
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--vscode-editorGroupHeader-tabsBackground);
            padding: 4px 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
        }

        .code-actions {
            display: flex;
            gap: 6px;
        }

        .code-action-btn {
            background: none;
            border: none;
            color: var(--vscode-icon-foreground);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.7;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .code-action-btn:hover {
            opacity: 1;
            background-color: var(--vscode-toolbar-hoverBackground);
        }

        .message-content pre {
            margin: 0;
            padding: 12px;
            overflow-x: auto;
        }
        .message-content code {
            font-family: var(--vscode-editor-font-family);
            font-size: 12px;
        }

        /* COMPOSER */
        .composer-wrapper {
            padding: var(--padding);
            background-color: var(--vscode-editor-background);
            flex-shrink: 0;
        }

        .composer-container {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--vscode-input-background);
            display: flex;
            flex-direction: column;
            padding: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .composer-textarea {
            width: 100%;
            box-sizing: border-box;
            background: transparent;
            color: var(--vscode-input-foreground);
            border: none;
            resize: none;
            font-family: inherit;
            font-size: 13px;
            min-height: 40px;
            max-height: 200px;
            outline: none;
        }

        .composer-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .context-btn {
            background: none;
            border: none;
            color: var(--vscode-textLink-foreground);
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .send-btn-icon {
            background: var(--primary);
            color: var(--vscode-button-foreground);
            border: none;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .send-btn-icon:hover { background: var(--primary-hover); }

        .status-bar {
            font-size: 10px;
            padding: 4px 16px;
            color: var(--vscode-descriptionForeground);
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
        }
        
        /* Loader */
        .pulsing-dot { animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <select id="model-selector" class="model-selector"></select>
        <button id="toggle-settings-btn" class="settings-btn" title="Settings">⚙️</button>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settings-panel" class="settings-panel">
        <h3 style="margin-top:0">Settings</h3>
        <button id="close-settings-btn" class="btn" style="background:var(--vscode-button-secondaryBackground);color:var(--vscode-button-secondaryForeground);margin-bottom:16px;">Close</button>
        <button id="new-chat-btn" class="btn" style="width:100%;margin-bottom:16px;">+ New Chat</button>
        <p style="opacity:0.7">Note: Keys and settings are managed in extension config.</p>
    </div>

    <!-- CHAT AREA -->
    <div id="messages-container" class="messages-container">
        <div class="message assistant">
            <div class="message-role">🤖 Nexus-Code</div>
            <div class="message-content">
                <p>Hello! I am Nexus-Code. Ask me a question, or use <code>@</code> to add context.</p>
            </div>
        </div>
    </div>

    <!-- COMPOSER -->
    <div class="composer-wrapper">
        <div class="composer-container">
            <textarea id="message-input" class="composer-textarea" placeholder="Ask a question... (Shift+Enter for new line)"></textarea>
            <div class="composer-toolbar">
                <button class="context-btn" title="Add context">➕ Add Context</button>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span id="char-count" style="font-size:10px;opacity:0.6;">0</span>
                    <button id="send-btn" class="send-btn-icon" title="Send (Enter)">➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="status-bar" class="status-bar">
        <span id="cache-indicator"></span>
        <span id="cost-indicator"></span>
    </div>

    <script nonce="{{nonce}}" src="{{webviewJsUri}}"></script>
</body>
</html>
