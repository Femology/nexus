<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
    <title>Nexus-Code Chat</title>
    <style>
        :root {
            --padding: 12px;
            --border-color: var(--vscode-widget-border, rgba(128, 128, 128, 0.35));
        }

        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            color: var(--vscode-editor-foreground);
            background-color: var(--vscode-editor-background);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER / MODEL SELECTOR */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px var(--padding);
            border-bottom: 1px solid var(--border-color);
            background-color: var(--vscode-editor-background);
            flex-shrink: 0;
        }

        .model-selector {
            background-color: var(--vscode-dropdown-background);
            color: var(--vscode-dropdown-foreground);
            border: 1px solid var(--vscode-dropdown-border);
            padding: 4px;
            border-radius: 2px;
            font-family: inherit;
            font-size: inherit;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--vscode-icon-foreground);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .settings-btn:hover {
            color: var(--vscode-button-foreground);
        }

        /* SETTINGS PANEL */
        .settings-panel {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--vscode-editor-background);
            z-index: 100;
            padding: var(--padding);
            overflow-y: auto;
        }

        .settings-panel.open {
            display: block;
        }

        .settings-group {
            margin-bottom: 16px;
        }

        .settings-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .settings-input {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            padding: 4px;
            margin-bottom: 8px;
        }

        .btn {
            background-color: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 2px;
        }

        .btn:hover {
            background-color: var(--vscode-button-hoverBackground);
        }

        .btn-secondary {
            background-color: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
        }

        .btn-secondary:hover {
            background-color: var(--vscode-button-secondaryHoverBackground);
        }

        .api-key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-color);
        }

        /* MESSAGE THREAD */
        .messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: var(--padding);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.9em;
            color: var(--vscode-descriptionForeground);
        }

        .message-role {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-content {
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-content p {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .message-content pre {
            background-color: var(--vscode-textCodeBlock-background, rgba(0,0,0,0.1));
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            position: relative;
        }

        .message-content code {
            font-family: var(--vscode-editor-font-family);
            font-size: 0.9em;
        }

        .copy-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 10px;
            padding: 2px 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        pre:hover .copy-btn {
            opacity: 1;
        }

        .status-badge {
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 10px;
            background-color: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
        }

        .status-badge.error {
            background-color: var(--vscode-errorForeground);
            color: var(--vscode-editor-background);
        }

        /* STATUS BAR */
        .status-bar {
            font-size: 0.8em;
            padding: 4px var(--padding);
            border-top: 1px solid var(--border-color);
            color: var(--vscode-descriptionForeground);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* COMPOSER */
        .composer-container {
            padding: var(--padding);
            border-top: 1px solid var(--border-color);
            background-color: var(--vscode-editor-background);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .composer-textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            padding: 8px;
            resize: none;
            font-family: inherit;
            font-size: inherit;
            min-height: 40px;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 2px;
        }

        .composer-textarea:focus {
            outline: 1px solid var(--vscode-focusBorder);
            outline-offset: -1px;
        }

        .composer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-count {
            font-size: 0.8em;
            color: var(--vscode-descriptionForeground);
        }

        /* Loader */
        .pulsing-dot {
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
    <!-- We will inject highlight.js styles via the extension if needed or use VS Code's native theme colors for code -->
</head>
<body>
    <div class="header">
        <select id="model-selector" class="model-selector">
            <option value="gpt-4o">gpt-4o</option>
        </select>
        <button id="toggle-settings-btn" class="settings-btn" title="Settings">⚙️</button>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settings-panel" class="settings-panel">
        <h3>Settings</h3>
        <button id="close-settings-btn" class="btn btn-secondary" style="margin-bottom: 16px;">Close</button>
        
        <div class="settings-group">
            <label>API Keys</label>
            <div id="api-key-list"></div>
            <div style="margin-top: 8px; display: flex; flex-direction: column; gap: 4px;">
                <input type="text" id="new-key-alias" class="settings-input" placeholder="Alias (e.g. openai-personal)">
                <input type="password" id="new-key-value" class="settings-input" placeholder="API Key">
                <select id="new-key-provider" class="settings-input">
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="google">Google</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="ollama">Ollama</option>
                </select>
                <button id="save-key-btn" class="btn">Save Key</button>
            </div>
        </div>

        <div class="settings-group">
            <label><input type="checkbox" id="setting-streaming"> Enable Streaming</label>
            <label><input type="checkbox" id="setting-terminal"> Include Terminal Context</label>
            <label>Max Open Tabs Context
                <input type="number" id="setting-tabs" class="settings-input" min="0" max="30">
            </label>
            <button id="save-settings-btn" class="btn">Save Configuration</button>
        </div>
        
        <div class="settings-group">
            <button id="new-chat-btn" class="btn btn-secondary" style="width: 100%;">New Chat</button>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div id="messages-container" class="messages-container">
        <!-- Messages will be injected here -->
        <div class="message">
            <div class="message-header">
                <div class="message-role">🤖 Nexus-Code</div>
            </div>
            <div class="message-content">
                <p>Hello! I am Nexus-Code. How can I help you today?</p>
            </div>
        </div>
    </div>

    <div id="status-bar" class="status-bar">
        <span id="cache-indicator"></span>
        <span id="savings-indicator"></span>
        <span id="cost-indicator"></span>
    </div>

    <!-- COMPOSER -->
    <div class="composer-container">
        <textarea id="message-input" class="composer-textarea" placeholder="Type a message... (Shift+Enter for new line)" rows="1"></textarea>
        <div class="composer-actions">
            <span id="char-count" class="char-count">0 chars</span>
            <button id="send-btn" class="btn">Send</button>
        </div>
    </div>

    <script nonce="{{nonce}}" src="{{webviewJsUri}}"></script>
</body>
</html>
